<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>FB Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 左側 -->
  <div class="left">
    <h1 class="title">facebook</h1>
    <p class="subtitle">探索你喜愛的事物</p>

    <!-- 卡片區 -->
    <div class="cards">
      <div class="card big"></div>
      <div class="card small top"></div>
      <div class="card small bottom"></div>
      <div class="avatar"></div>
      <div class="heart">❤</div>
    </div>
  </div>

  <!-- 右側 -->
  <div class="right">
    <div class="login-box">
      <input type="text" id="account" placeholder="電子郵件地址或手機號碼">
      <input type="password" id="password" placeholder="密碼">

      <button class="login-btn">登入</button>

      <a href="#" class="forgot">忘記密碼？</a>

      <div class="divider"></div>

      <button class="create-btn">建立新帳號</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
