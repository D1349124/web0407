<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Facebook Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 左側 -->
  <div class="left">
    <h1>facebook</h1>
    <p>探索你喜愛的事物<br>與世界連結</p>
  </div>

  <!-- 右側 -->
  <div class="right">

    <div class="login-box">
      <input type="text" id="account" placeholder="電子郵件地址或手機號碼">
      <input type="password" id="password" placeholder="密碼">

      <button class="login-btn">登入</button>

      <a href="#" class="forgot">忘記密碼？</a>

      <div class="divider"></div>

      <button class="create-btn">建立新帳號</button>
    </div>

    <!-- ✅ Meta 圖片 -->
    <div class="meta">
      <img src="meta-logo.png" alt="Meta">
    </div>

  </div>

</div>

<!-- 語言列 -->
<div class="footer">
  <span>中文(台灣)</span>
  <span>English (US)</span>
  <span>日本語</span>
  <span>Español</span>
  <span>更多...</span>
</div>

<script src="script.js"></script>
</body>
</html>
